name: Run R Script Daily

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch: {}
  
jobs:
  run-r-script:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        
      - name: Install system dependencies
        run: |
          sudo apt-get update -y 
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libpng-dev \
            libjpeg-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfontconfig1-dev \
            || true
        
      - name: Install packages
        run: Rscript -e 'install.packages(c("tidyverse", "tidymodels", "here", "showtext", "httr", "magick", "grid", "gridExtra", "jsonlite", "zoo", "scales", "shiny", "rsconnect", "baseballr"), repos="https://cloud.r-project.org")'
        
      - name: Run script
        run: Rscript processing/reg_season_predictions.R