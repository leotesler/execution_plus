name: Run R Script Daily

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch: {}
  
jobs:
  run-r-script:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        
      - name: Install packages
        run: |
          Rscript -e 'install.packages(c(
          "tidyverse",
          "httr",
          "tidymodels",
          "jsonlite",
          "magick",
          "zoo",
          "here",
          "baseballr",
          "rvest",
          "grid",
          "showtext",
          "gridExtra",
          "scales",
          "shiny",
          "rsconnect"
          ), repos="https://cloud.r-project.org")'
        
      - name: Run script
        run: Rscript processing/reg_season_predictions.R