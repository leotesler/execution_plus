name: Run R Script Daily

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch: {}

jobs:
  run-r-script:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      # Install system dependencies needed by magick
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libpng-dev libmagick++-dev

      # Install R packages from CRAN
      - name: Install packages
        run: |
          Rscript -e 'install.packages(c(
            "tidyverse",
            "httr",
            "tidymodels",
            "jsonlite",
            "magick",
            "zoo",
            "here",
            "baseballr",
            "rvest",
            "gridExtra",
            "scales",
            "shiny",
            "rsconnect"
          ), repos="https://cloud.r-project.org")'

      - name: Run script
        run: Rscript processing/reg_season_predictions.R
